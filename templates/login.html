<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - ICU餐厅会员看板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-wrapper{
    display: flex;
    width: 800px;
    height: 480px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 20px rgba(0,0,0,.08);
    overflow: hidden;
}

.login-left{
    width: 360px;
    background: #008040;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 40px;
}

.login-left .brand{
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 12px;
    color: #e6f5ec;
}

.login-left .brand-sub{
    font-size: 14px;
    color: rgba(255,255,255,0.78);
    line-height: 1.8;
}

.login-right{
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px;
}

.login-right h2{
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 600;
    color: #222;
    margin-bottom: 6px;
}

.login-right .subtitle{
    font-size: 13px;
    color: #999;
    margin-bottom: 32px;
}

.form-group{
    margin-bottom: 22px;
}

.form-group label{
    display: block;
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
}

.form-group input{
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 2px;
    font-size: 14px;
    color: #333;
    outline: none;
    transition: border-color .2s;
}

.form-group input:focus{
    border-color: #333;
}

.btn-login{
    width: 100%;
    padding: 11px;
    background: #008040;
    color: #fff;
    border: none;
    border-radius: 2px;
    font-size: 15px;
    cursor: pointer;
    transition: background .2s;
    letter-spacing: 2px;
}

.btn-login:hover{
    background: #333;
}

.btn-login:disabled{
    background: #999;
    cursor: not-allowed;
}

.error-msg{
    color: #c0392b;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    display: none;
}

.error-msg.show{
    display: block;
}
</style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-left">
        <div class="brand">ICU餐厅会员看板</div>
        <div class="brand-sub">
            基于堂食经营数据的<br>
            全链路会员分析平台<br>
            洞察机会，驱动增长
        </div>
    </div>
    <div class="login-right">
        <h2>登录</h2>
        <p class="subtitle">请输入账号密码访问系统</p>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="submitBtn">登 录</button>
            <p class="error-msg" id="errorMsg"></p>
        </form>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = '登录中...';
    error.classList.remove('show');

    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            })
        });
        const data = await resp.json();
        if (resp.ok) {
            window.location.href = '/';
        } else {
            error.textContent = data.error || '登录失败';
            error.classList.add('show');
        }
    } catch (e) {
        error.textContent = '网络错误，请重试';
        error.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = '登 录';
});
</script>
</body>
</html>
